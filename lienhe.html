<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Liên hệ | Minh Nhật Store</title>
  </head>
  <body>
    <header>
      <div class="navbar">
        <div class="logo-container">
          <img
            src="./anh/481780866_122093212556802956_3033451504716178783_n.jpg"
            alt="Logo"
            class="logo"
          />
          <span class="brand-name">Minh Nhật Store</span>
        </div>
        <nav class="nav-menu">
          <ul>
            <li><a href="index.html">Trang Chủ</a></li>
            <li><a href="sanpham.html">Sản Phẩm</a></li>
            <li><a href="lienhe.html">Liên Hệ</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <h2>Liên hệ với chúng tôi</h2>
      <form action="https://formspree.io/f/xvgqawqa" method="POST" class="contact-form">
        <label for="name">Họ và tên:</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Nội dung:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Gửi liên hệ</button>
      </form>
    </main>

    <footer>
      <p>&copy; 2025 Minh Nhật Store</p>
    </footer>
  </body>
</html>
